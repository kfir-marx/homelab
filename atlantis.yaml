# ──────────────────────────────────────────────────────────────────────────────
# Atlantis repo-level config.
#
# Atlantis watches for PRs that touch terraform/ and runs plan/apply
# automatically using Terragrunt. Apply requires explicit PR approval.
#
# Docs: https://www.runatlantis.io/docs/repo-level-atlantis-yaml.html
#       https://www.runatlantis.io/docs/terragrunt.html
# ──────────────────────────────────────────────────────────────────────────────

version: 3
automerge: false
parallel_plan: true
parallel_apply: false         # Apply one environment at a time for safety.
abort_on_execution_order_fail: true

projects:
  - name: homelab-prod
    dir: terraform/deployments/prod/homelab-cluster
    workspace: default
    terraform_version: v1.11.4
    autoplan:
      when_modified:
        - "*.hcl"
        - "../config.yml"                          # env-level overrides
        - "../../config.yml"                       # global defaults
        - "../../root.hcl"                         # backend / inputs
        - "../../../modules/stacks/homelab-cluster/**/*.tf"
        - "../../../modules/stacks/homelab-cluster/**/*.yaml"
      enabled: true
    apply_requirements:
      - approved                        # At least one PR approval required.
      - mergeable                       # Branch protection checks must pass.
    workflow: terragrunt

  - name: windows-workstation-prod
    dir: terraform/deployments/prod/windows-workstation
    workspace: default
    terraform_version: v1.11.4
    autoplan:
      when_modified:
        - "*.hcl"
        - "config.yml"
        - "../config.yml"
        - "../../config.yml"
        - "../../root.hcl"
        - "../../../modules/stacks/windows-workstation/**/*.tf"
        - "../../../modules/components/proxmox-windows-vm/**/*.tf"
      enabled: true
    apply_requirements:
      - approved
      - mergeable
    workflow: terragrunt

workflows:
  terragrunt:
    plan:
      steps:
        - env:
            name: TG_TF_PATH
            command: 'echo "terraform${ATLANTIS_TERRAFORM_VERSION}"'
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - env:
            name: TG_NON_INTERACTIVE
            value: "true"
        - run: '"$DIR/../../../run-terragrunt.sh" prod "$(basename "$DIR")" plan -input=false -no-color -out="$PLANFILE"'
    apply:
      steps:
        - env:
            name: TG_TF_PATH
            command: 'echo "terraform${ATLANTIS_TERRAFORM_VERSION}"'
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - env:
            name: TG_NON_INTERACTIVE
            value: "true"
        - run: '"$DIR/../../../run-terragrunt.sh" prod "$(basename "$DIR")" apply -no-color "$PLANFILE"'
