---
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Global defaults — shared across all environments                          ║
# ║  Override any value in environment-specific config.yml files.              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Proxmox connection ───────────────────────────────────────────────────────
proxmox_api_url: "https://192.168.1.101:8006"

# ── Talos ────────────────────────────────────────────────────────────────────
talos_version: "v1.9.5"
talos_image_datastore: "local"

# ── Network defaults ─────────────────────────────────────────────────────────
network_bridge: "vmbr0"
network_nameservers:
  - "1.1.1.1"
  - "8.8.8.8"

# ── ArgoCD / GitOps ─────────────────────────────────────────────────────────
argocd_repo_url: "https://github.com/kfir-marx/homelab.git"
argocd_app_path: "kubernetes/apps"
