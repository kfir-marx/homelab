---
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Global defaults — shared across all environments                          ║
# ║  Override any value in environment-specific config.yml files.              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Proxmox connection ───────────────────────────────────────────────────────
proxmox_api_url: "https://192.168.1.105:8006"

# ── Talos ────────────────────────────────────────────────────────────────────
talos_version: "v1.13.7"
# Cilium 1.19 officially supports Kubernetes 1.31–1.34. Talos 1.13 supports
# Kubernetes 1.31–1.36, so pin the newest release supported by both projects
# instead of accepting Talos's Kubernetes 1.36 default.
kubernetes_version: "1.34.9"
cilium_version: "1.19.6"
talos_image_datastore: "local"

# ── Network defaults ─────────────────────────────────────────────────────────
network_bridge: "vmbr0"
network_nameservers:
  - "1.1.1.1"
  - "8.8.8.8"

# ── ArgoCD / GitOps ─────────────────────────────────────────────────────────
argocd_repo_url: "https://github.com/kfir-marx/homelab.git"
argocd_app_path: "kubernetes/apps"
