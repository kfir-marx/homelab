---
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Production environment                                                    ║
# ║                                                                            ║
# ║  1 CP + 1 general worker + 3 GPU workers on 192.168.1.0/24.               ║
# ║  Sized for the three remaining hosts and the existing workstation VM.     ║
# ║                                                                            ║
# ║  IP convention (matches the rest of the homelab):                          ║
# ║    192.168.1.101–199  → physical machines (Proxmox hosts, etc.)            ║
# ║    192.168.1.200–299  → VMs                                                ║
# ║                                                                            ║
# ║  Putting VMs directly on the home subnet means no static route on the      ║
# ║  router and no IP-forwarding tricks on the Proxmox host. Mac, kubectl,     ║
# ║  talosctl, and any future Proxmox node can reach VMs natively over L2.     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Cluster settings ─────────────────────────────────────────────────────────
cluster_name: "homelab"
cluster_endpoint: "https://192.168.1.210:6443"
cluster_vip: "192.168.1.210"

# ── Network ──────────────────────────────────────────────────────────────────
network_gateway: "192.168.1.1"

# ── ArgoCD ───────────────────────────────────────────────────────────────────
argocd_target_revision: "main"

# ── Control-plane node (single-node control plane; intentionally not HA) ─────
# smallgpu is back online and has 15.5 GiB RAM. The CP gets 2c/4GiB and shares
# the host with one 4 GiB general worker and one 4 GiB GPU worker, leaving
# ~3.5 GiB physical RAM for Proxmox + the planned bulk NFS service. Return to
# 3 CPs only after gpunvdgtx1060 can host one without squeezing its workstation
# and NFS.
control_plane_nodes:
  cp-1:
    proxmox_node: "smallgpu"
    vm_id: 201
    ip_address: "192.168.1.211/24"
    cores: 2
    memory_mb: 4096
    disk_size_gb: 50

# ── Worker nodes ──────────────────────────────────────────────────────────────
# Critical NFS runs directly on gpunvdgtx1060's Proxmox host; Kubernetes does
# not need a storage-local general worker. This VM carries ordinary workloads.
worker_nodes:
  # smallgpu: CP (4 GiB) + general worker (4 GiB) + RTX 2060 worker (4 GiB)
  # leaves ~3.5 GiB for Proxmox, QEMU overhead, and the planned bulk NFS.
  # Keep requests realistic and grow only after measuring host pressure.
  worker-general:
    proxmox_node: "smallgpu"
    vm_id: 302
    ip_address: "192.168.1.222/24"
    cores: 4
    memory_mb: 4096
    disk_size_gb: 100

# ── GPU nodes (PCIe passthrough; automatically tainted NoSchedule) ───────────
gpu_nodes:
  # gpunvdgtx1060: GTX 1060 Mobile at 01:00 (GPU + audio in IOMMU group 2).
  # Proxmox itself runs storage2-bulk NFS, so this VM exists only to expose the
  # GPU to Kubernetes. VM 100 remains a 10 GiB workstation. Before starting
  # this 3 GiB worker, enable virtio ballooning on VM 100 with an 8 GiB minimum
  # (`qm set 100 --memory 10240 --balloon 8192`) or set VM 100 to 9 GiB fixed.
  gpu-1:
    proxmox_node: "gpunvdgtx1060"
    vm_id: 401
    ip_address: "192.168.1.231/24"
    cores: 2
    memory_mb: 3072
    disk_size_gb: 50
    pci_devices:
      - id: "01:00"
        pcie: true

  # largegpu: Ryzen 7 5800X (8c/16t), 62.7 GiB RAM, RTX 3080 at 08:00.
  # The Talos GPU VM is reduced to 8c/32GiB: ample initial GPU capacity without
  # reserving the whole host. It remains mutually exclusive with the 60 GiB
  # Windows VM because both pass through the RTX 3080. Stop 402 before 502.
  gpu-2:
    proxmox_node: "largegpu"
    vm_id: 402
    ip_address: "192.168.1.232/24"
    cores: 8
    memory_mb: 32768
    disk_size_gb: 159
    pci_devices:
      - id: "08:00"
        pcie: true

  # smallgpu: RTX 2060 at 09:00; GPU, audio, USB, and UCSI functions share
  # IOMMU group 18 and are passed through together. CP + general worker + this
  # VM reserve 12 GiB total, leaving ~3.5 GiB for Proxmox and planned bulk NFS.
  # Host prerequisite before apply/start: bind PCI IDs 10de:1e89, 10de:10f8,
  # 10de:1ad8, and 10de:1ad9 to vfio-pci, rebuild initramfs, and reboot
  # smallgpu. They are currently bound to host drivers, so passthrough will fail.
  gpu-3:
    proxmox_node: "smallgpu"
    vm_id: 403
    ip_address: "192.168.1.233/24"
    cores: 4
    memory_mb: 4096
    disk_size_gb: 100
    pci_devices:
      - id: "09:00"
        pcie: true

# ── Windows VMs (mutually exclusive with gpu_nodes on the same host) ─────────
# Both VM 402 and VM 502 are defined with the RTX 3080. Proxmox enforces the
# mutex when they start: shut down gpu-2 before starting Windows, and shut down
# Windows before starting gpu-2. Terraform does not toggle either definition.
#
# Before applying with this enabled:
#   1. Upload Win11 ISO and virtio-win.iso to the largegpu node's `local`
#      ISO datastore (Proxmox UI → largegpu → local → ISO Images → Upload).
#      virtio-win.iso source:
#        https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso
#   2. Fill in usb_devices below — run `lsusb` on the largegpu Proxmox host
#      with mouse/keyboard/controllers plugged in, then copy the VID:PID
#      pairs (e.g. "046d:c52b") into the list.
windows_vms:
  largegpu-win11:
    proxmox_node: "largegpu"
    vm_id: 502
    # CPU/RAM maxed: gaming server, takes the entire host when running.
    # 5800X has 8c/16t with SMT — expose all 16 threads as 1 socket × 16 cores.
    # 61440 MB = 60 GB; host has ~62.7 GB usable, leaving ~2 GB for Proxmox.
    cores: 16
    memory_mb: 61440
    # ~80% of largegpu's NVMe LVM-thin (gpu-2 Talos worker gets the other ~20%).
    # Plenty for Windows + Steam library; bulk media goes to storage1-bulk NFS
    # (on smallgpu, the bulk-storage host — 10 TB NTFS over NFSv4).
    disk_size_gb: 635
    windows_iso: "Win11_25H2_EnglishInternational_x64_v2.iso"
    virtio_iso: "virtio-win.iso"
    # template_vm_id: when null/unset → INSTALL mode (boots Windows ISO).
    # After you finish installing apps and clone-then-template VM 502 in
    # the Proxmox UI (Clone → mode: Full Clone → new VMID like 9000 →
    # then Convert-to-Template on 9000), set:
    #   template_vm_id: 9000
    # Subsequent applies will recreate this VM as a fresh clone of the
    # template in ~30s (linked clone — change full_clone: true to false
    # for that, or keep true for an independent disk copy).
    # template_vm_id: 9000
    # full_clone: true
    pci_devices:
      - id: "08:00"
        pcie: true
    # Mix of VID:PID (replug-safe) and bus-port (used where two devices
    # share a VID:PID — both Novalite dongles emulate Sony 054c:09cc).
    # Re-pull /nodes/largegpu/hardware/usb if devices move between ports.
    usb_devices:
      - host: "046d:c077"    # Logitech USB Optical Mouse
        usb3: false
      - host: "046d:c34b"    # Logitech USB Keyboard
        usb3: false
      - host: "1-2"          # Novalite controller #1 dongle (bus1 port2)
        usb3: false
      - host: "5-3"          # Novalite controller #2 dongle (bus5 port3)
        usb3: false
      - host: "33fa:0012"    # BARROT Bluetooth 6.0 adapter
        usb3: false
