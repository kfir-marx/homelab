---
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Production environment                                                    ║
# ║                                                                            ║
# ║  3 CP + 2 workers + 2 GPU on the home LAN (192.168.1.0/24).               ║
# ║                                                                            ║
# ║  IP convention (matches the rest of the homelab):                          ║
# ║    192.168.1.101–199  → physical machines (Proxmox hosts, etc.)            ║
# ║    192.168.1.200–299  → VMs                                                ║
# ║                                                                            ║
# ║  Putting VMs directly on the home subnet means no static route on the      ║
# ║  router and no IP-forwarding tricks on the Proxmox host. Mac, kubectl,     ║
# ║  talosctl, and any future Proxmox node can reach VMs natively over L2.     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Cluster settings ─────────────────────────────────────────────────────────
cluster_name: "homelab"
cluster_endpoint: "https://192.168.1.210:6443"
cluster_vip: "192.168.1.210"

# ── Network ──────────────────────────────────────────────────────────────────
network_gateway: "192.168.1.1"

# ── ArgoCD ───────────────────────────────────────────────────────────────────
argocd_target_revision: "main"

# ── Control-plane nodes (3x HA across worker1-3 Proxmox hosts) ──────────────
# 4c/8GiB each — modest bump from the bare 2c/4GiB minimum to give etcd +
# kube-apiserver breathing room now that workers (worker-3/4/5) share these
# hosts. Plenty for a 7-node cluster.
control_plane_nodes:
  cp-1:
    proxmox_node: "worker1"
    vm_id: 201
    ip_address: "192.168.1.211/24"
    cores: 4
    memory_mb: 8192
    disk_size_gb: 50
  cp-2:
    proxmox_node: "worker2"
    vm_id: 202
    ip_address: "192.168.1.212/24"
    cores: 4
    memory_mb: 8192
    disk_size_gb: 50
  cp-3:
    proxmox_node: "worker3"
    vm_id: 203
    ip_address: "192.168.1.213/24"
    cores: 4
    memory_mb: 8192
    disk_size_gb: 50

# ── Worker nodes (compute) ───────────────────────────────────────────────────
# Two patterns here:
#   1. Dedicated-host workers (worker-1 on worker4, worker-2 on node6) — one
#      worker = the whole Proxmox host. Full cores, RAM minus ~2-3 GiB for
#      Proxmox.
#   2. Colocated workers (worker-3/4/5 on worker1/2/3) — share the host with
#      a control-plane VM. CP gets 4c/8GiB; worker takes 8c/20GiB; ~3 GiB
#      stays with Proxmox. Trade-off: CP etcd can see fsync stalls under
#      heavy worker load — acceptable in a homelab where the outage cost is
#      low. Recaptures ~24c/60GiB across the three CP hosts that would
#      otherwise sit idle.
# Host specs come from the Proxmox API (`pvesh get /nodes`).
worker_nodes:
  # worker4 host: 12 cores / 31 GiB physical.
  # VM gets all 12 cores + 28 GiB (leaves ~3 GB for Proxmox).
  worker-1:
    proxmox_node: "worker4"
    vm_id: 301
    ip_address: "192.168.1.221/24"
    cores: 12
    memory_mb: 28672
    disk_size_gb: 100
  # node6 (formerly `storage1`) host: 12 cores / 15.5 GiB physical, plus the
  # 10 TB NTFS bulk drive at /mnt/data10tb exported over NFSv4 as `storage1-bulk`
  # (see kubernetes/system/storage/storage1-bulk.yaml). PV/SC names kept on
  # the K8s side so existing PVC bindings continue to resolve.
  # VM gets all 12 cores + 13 GiB (leaves ~2.5 GB for Proxmox + NFS server).
  worker-2:
    proxmox_node: "node6"
    vm_id: 302
    ip_address: "192.168.1.222/24"
    cores: 12
    memory_mb: 13312
    disk_size_gb: 100
  # worker1 host: 12 cores / 31 GiB physical, shares with cp-1.
  # Worker gets 8c/20 GiB; cp-1 gets 4c/8 GiB; ~3 GiB Proxmox.
  worker-3:
    proxmox_node: "worker1"
    vm_id: 303
    ip_address: "192.168.1.223/24"
    cores: 8
    memory_mb: 20480
    disk_size_gb: 100
  # worker2 host: 12 cores / 31 GiB physical, shares with cp-2.
  # Worker gets 8c/20 GiB; cp-2 gets 4c/8 GiB; ~3 GiB Proxmox.
  worker-4:
    proxmox_node: "worker2"
    vm_id: 304
    ip_address: "192.168.1.224/24"
    cores: 8
    memory_mb: 20480
    disk_size_gb: 100
  # worker3 host: 12 cores / 31 GiB physical, shares with cp-3.
  # Worker gets 8c/20 GiB; cp-3 gets 4c/8 GiB; ~3 GiB Proxmox.
  worker-5:
    proxmox_node: "worker3"
    vm_id: 305
    ip_address: "192.168.1.225/24"
    cores: 8
    memory_mb: 20480
    disk_size_gb: 100

# ── GPU nodes (PCIe passthrough) ─────────────────────────────────────────────
gpu_nodes:
  # GTX 1060 host (gpunvdgtx1060): 12 cores / 15.5 GiB physical.
  # This is the only permanent host in the fleet — also runs the storage2-bulk
  # NFS server (carved out of gpu1-extra LVM-thin) for the critical/personal
  # data tier (see docs/architecture.md → Node ownership).
  # VM gets all 12 cores + 13 GiB (leaves ~2.5 GB for Proxmox + NFS server).
  gpu-1:
    proxmox_node: "gpunvdgtx1060"
    vm_id: 401
    ip_address: "192.168.1.231/24"
    cores: 12
    memory_mb: 13312
    disk_size_gb: 100
    pci_devices:
      - id: "01:00"
        pcie: true
  # RTX 3080 host — Ryzen 7 5800X (8c/16t), 64 GiB RAM, 794 GB local-lvm.
  # IOMMU group 21 contains only the GPU at 0000:08:00.0.
  # Disk sized to ~20% of largegpu's NVMe LVM-thin (Windows VM gets ~80%).
  # CPU/RAM maxed: this VM and largegpu-win11 both eat the entire host —
  # only one runs at a time (Proxmox enforces at start). Leave ~2 GB for
  # the Proxmox host itself; everything else goes to the active VM.
  gpu-2:
    proxmox_node: "largegpu"
    vm_id: 402
    ip_address: "192.168.1.232/24"
    cores: 16
    memory_mb: 61440
    disk_size_gb: 159
    pci_devices:
      - id: "08:00"
        pcie: true

# ── Windows VMs (mutually exclusive with gpu_nodes on the same host) ─────────
# Uncomment a block below to take the GPU off the matching Talos GPU worker
# (gpu-2 on largegpu) and hand it to a Windows VM instead. Re-comment to
# flip back. The mutex is enforced in modules/stacks/homelab-cluster/main.tf
# via locals.windows_hosts → local.active_gpu_nodes.
#
# Before applying with this enabled:
#   1. Upload Win11 ISO and virtio-win.iso to the largegpu node's `local`
#      ISO datastore (Proxmox UI → largegpu → local → ISO Images → Upload).
#      virtio-win.iso source:
#        https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso
#   2. Fill in usb_devices below — run `lsusb` on the largegpu Proxmox host
#      with mouse/keyboard/controllers plugged in, then copy the VID:PID
#      pairs (e.g. "046d:c52b") into the list.
windows_vms:
  largegpu-win11:
    proxmox_node: "largegpu"
    vm_id: 502
    # CPU/RAM maxed: gaming server, takes the entire host when running.
    # 5800X has 8c/16t with SMT — expose all 16 threads as 1 socket × 16 cores.
    # 61440 MB = 60 GB; host has ~62.7 GB usable, leaving ~2 GB for Proxmox.
    cores: 16
    memory_mb: 61440
    # ~80% of largegpu's NVMe LVM-thin (gpu-2 Talos worker gets the other ~20%).
    # Plenty for Windows + Steam library; bulk media goes to storage1-bulk NFS
    # (on node6, the bulk-storage host — 10 TB NTFS over NFSv4).
    disk_size_gb: 635
    windows_iso: "Win11_25H2_EnglishInternational_x64_v2.iso"
    virtio_iso: "virtio-win.iso"
    # template_vm_id: when null/unset → INSTALL mode (boots Windows ISO).
    # After you finish installing apps and clone-then-template VM 502 in
    # the Proxmox UI (Clone → mode: Full Clone → new VMID like 9000 →
    # then Convert-to-Template on 9000), set:
    #   template_vm_id: 9000
    # Subsequent applies will recreate this VM as a fresh clone of the
    # template in ~30s (linked clone — change full_clone: true to false
    # for that, or keep true for an independent disk copy).
    # template_vm_id: 9000
    # full_clone: true
    pci_devices:
      - id: "08:00"
        pcie: true
    # Mix of VID:PID (replug-safe) and bus-port (used where two devices
    # share a VID:PID — both Novalite dongles emulate Sony 054c:09cc).
    # Re-pull /nodes/largegpu/hardware/usb if devices move between ports.
    usb_devices:
      - host: "046d:c077"    # Logitech USB Optical Mouse
        usb3: false
      - host: "046d:c34b"    # Logitech USB Keyboard
        usb3: false
      - host: "1-2"          # Novalite controller #1 dongle (bus1 port2)
        usb3: false
      - host: "5-3"          # Novalite controller #2 dongle (bus5 port3)
        usb3: false
      - host: "33fa:0012"    # BARROT Bluetooth 6.0 adapter
        usb3: false
