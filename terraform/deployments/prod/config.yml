---
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Production environment                                                    ║
# ║                                                                            ║
# ║  1 control plane + 2 GPU workers on the home LAN (192.168.1.0/24).        ║
# ║  Sized for the three remaining hosts and the existing workstation VM.     ║
# ║                                                                            ║
# ║  IP convention (matches the rest of the homelab):                          ║
# ║    192.168.1.101–199  → physical machines (Proxmox hosts, etc.)            ║
# ║    192.168.1.200–299  → VMs                                                ║
# ║                                                                            ║
# ║  Putting VMs directly on the home subnet means no static route on the      ║
# ║  router and no IP-forwarding tricks on the Proxmox host. Mac, kubectl,     ║
# ║  talosctl, and any future Proxmox node can reach VMs natively over L2.     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Cluster settings ─────────────────────────────────────────────────────────
cluster_name: "homelab"
cluster_endpoint: "https://192.168.1.210:6443"
cluster_vip: "192.168.1.210"

# ── Network ──────────────────────────────────────────────────────────────────
network_gateway: "192.168.1.1"
# Reserved for Cilium LB IPAM. This range is outside the addresses used by the
# Kubernetes API and Talos nodes and was explicitly approved for homelab use.
cilium_load_balancer_ip_start: "192.168.1.220"
cilium_load_balancer_ip_stop: "192.168.1.229"

# ── ArgoCD ───────────────────────────────────────────────────────────────────
argocd_target_revision: "main"

# ── Control-plane node (single-node control plane; intentionally not HA) ─────
# smallgpu is back online and has 15.5 GiB RAM. The CP gets 2c/4GiB and the
# RTX 2060 worker gets 10c/8GiB, leaving ~3.5 GiB physical RAM for Proxmox,
# QEMU overhead, and the planned bulk NFS service. Return to
# 3 CPs only after gpunvdgtx1060 can host one without squeezing its workstation
# and NFS.
control_plane_nodes:
  cp-1:
    proxmox_node: "smallgpu"
    vm_id: 201
    ip_address: "192.168.1.211/24"
    cores: 2
    memory_mb: 4096
    disk_size_gb: 50

# ── General workers ───────────────────────────────────────────────────────────
# None: gpu-3 is a mixed general+GPU worker in one VM. NFS runs on the Proxmox
# hosts and does not require a colocated general Kubernetes worker.
worker_nodes: {}

# ── GPU nodes (PCIe passthrough; dedicated nodes are tainted NoSchedule) ─────
# The GTX 1060 on gpunvdgtx1060 is reserved for workstation VM 100 and is not
# part of Kubernetes. That host also retains headroom for its critical NFS role.
gpu_nodes:
  # largegpu: Ryzen 7 5800X (8c/16t), 62.7 GiB RAM, RTX 3080 at 08:00.
  # The Talos GPU VM is reduced to 8c/32GiB: ample initial GPU capacity without
  # reserving the whole host. It remains mutually exclusive with the 60 GiB
  # Windows VM because both pass through the RTX 3080. Stop 402 before 502.
  gpu-2:
    proxmox_node: "largegpu"
    vm_id: 402
    ip_address: "192.168.1.232/24"
    cores: 8
    memory_mb: 32768
    disk_size_gb: 159
    pci_devices:
      - id: "08:00"
        pcie: true

  # smallgpu: RTX 2060 at 09:00; GPU, audio, USB, and UCSI functions share
  # IOMMU group 18 and are passed through together. CP + this VM reserve 12 GiB
  # total, leaving ~3.5 GiB for Proxmox, QEMU overhead, and planned bulk NFS.
  # Unlike gpu-2, this node is not tainted: it also runs ordinary pods.
  # Host prerequisite verified 2026-07-22: PCI IDs 10de:1e89, 10de:10f8,
  # 10de:1ad8, and 10de:1ad9 bind to vfio-pci and /dev/vfio/18 exists.
  gpu-3:
    proxmox_node: "smallgpu"
    vm_id: 403
    ip_address: "192.168.1.233/24"
    cores: 10
    memory_mb: 8192
    disk_size_gb: 100
    dedicated: false
    pci_devices:
      - id: "09:00"
        pcie: true
