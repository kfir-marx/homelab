# Cluster-scoped NFS PV backed by gpunvdgtx1060's gpu1-extra LVM-thin
# pool. Carved out + ext4-formatted on the host, then exported over
# NFSv4 to the home LAN.
#
# Storage tier: CRITICAL / PERSONAL. gpunvdgtx1060 is the only permanent
# host in the fleet — all other Proxmox nodes (incl. node6 which backs
# storage1-bulk) are borrowed hardware that may be reclaimed at any
# time. Anything we can't afford to lose — personal cloud (Immich),
# config snapshots, important app state — should bind here, not to
# storage1-bulk. Bulk media and reproducible data go to storage1-bulk.
#
# Originally spun up as a fallback while storage1 (now node6) was down;
# kept as the canonical critical-data tier going forward.
#
# Physical-host mount, package, service, and export configuration is owned by
# ansible/roles/nfs_server using gpunvdgtx1060's inventory variables. Run
# ansible/playbooks/configure-proxmox.yml and verify-proxmox.yml. Disk/LVM
# creation and formatting are deliberately outside automation because they are
# destructive; the role only accepts the already-declared filesystem UUID.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: storage2-bulk-pv
  labels:
    storage: storage2-bulk
    medium: ssd
    tier: critical
spec:
  capacity:
    storage: 800Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage2
  mountOptions:
    - nfsvers=4.2
    - hard
  nfs:
    server: 192.168.1.105 # gpunvdgtx1060 Proxmox host (NFS server)
    path: /mnt/storage2-bulk
---
# Static StorageClass — same pattern as nfs-storage1. No dynamic
# provisioning; PVs are declared explicitly so they bind by name.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage2
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
reclaimPolicy: Retain
