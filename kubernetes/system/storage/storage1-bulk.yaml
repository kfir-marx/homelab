# Cluster-scoped NFS PV intended for smallgpu's 10 TB NTFS bulk drive.
# The filesystem is mounted via the kernel `ntfs3` driver on the Proxmox host
# (smallgpu, 192.168.1.106) at
# /mnt/data10tb, then exported over NFSv4 to the home LAN. RWX lets multiple
# pods (e.g. *arr stack alongside
# the streaming server) can share the library. PVC lives in the consuming
# app's namespace — see the example at the bottom.
#
# The Proxmox host was previously named `storage1`, then `node6`, and is now
# `smallgpu`. PV/StorageClass names are kept (`storage1-bulk-pv`,
# `nfs-storage1`) so any in-cluster PVC bindings continue to resolve.
#
# Storage tier: BULK / NON-CRITICAL. smallgpu is not a permanent host —
# critical or personal data (Immich, etc.) should target the
# `storage2-bulk` tier (on gpunvdgtx1060, the only permanent machine).
#
# Physical-host setup is owned by ansible/roles/nfs_server using smallgpu's
# inventory variables. Run ansible/playbooks/configure-proxmox.yml, then
# ansible/playbooks/verify-proxmox.yml. The role refuses dirty/hibernated NTFS,
# never force-mounts, and never clears filesystem flags. Windows chkdsk /f plus
# a full shutdown remains the only approved repair path when preflight fails.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: storage1-bulk-pv
  labels:
    storage: storage1-bulk
    medium: hdd
    tier: bulk
spec:
  capacity:
    storage: 9Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage1
  mountOptions:
    - nfsvers=4.2
    - hard
  nfs:
    server: 192.168.1.106 # smallgpu Proxmox host (previously node6/storage1)
    path: /mnt/data10tb
---
# Empty StorageClass so the PV/PVC binding has a name to match on.
# Not a provisioner — PVs here are statically defined.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage1
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
reclaimPolicy: Retain
---
