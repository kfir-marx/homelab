name: "Terraform Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write

env:
  TG_WORK_DIR: terraform/deployments/prod/homelab-cluster
  TF_VERSION: "1.11.4"
  TG_VERSION: "0.63.0"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Lint & format check
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: Terragrunt hclfmt
        run: terragrunt hclfmt --terragrunt-check --terragrunt-working-dir terraform/deployments

  # ────────────────────────────────────────────────────────────────────────────
  # Security scan with tfsec
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/modules/
          soft_fail: true # Don't block PRs yet — tune rules first.

  # ────────────────────────────────────────────────────────────────────────────
  # Plan (for visibility — Atlantis handles the real apply)
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ env.TG_WORK_DIR }}
        run: terragrunt plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true
        env:
          PROXMOX_API_TOKEN: "${{ secrets.PROXMOX_APITOKEN_ID }}=${{ secrets.PROXMOX_APITOKEN_SECRET }}"
          PROXMOX_SSH_PASSWORD: ${{ secrets.PROXMOX_SSH_PASSWORD }}

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TG_WORK_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terragrunt Plan 📋\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
